<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sky Fighter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; user-select: none; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  #ui { font-family: monospace; color: #fff; text-align: center; padding: 4px 0; background: #000; width: 100%; flex-shrink: 0; }
  #ui span { margin: 0 10px; font-size: clamp(11px, 2.5vw, 14px); letter-spacing: 1px; }
  #gameCanvas { display: block; background: #000; image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; flex-shrink: 0; }
  #touchControls {
    width: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(12px, 4vw, 32px);
    flex-shrink: 0;
    flex: 1;
    min-height: 0;
  }
  #dpad {
    position: relative;
    width: clamp(120px, 33vw, 180px);
    height: clamp(120px, 33vw, 180px);
    flex-shrink: 0;
  }
  .dBtn {
    position: absolute;
    width: 33.3%;
    height: 33.3%;
    background: #111;
    border: 1.5px solid #444;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: clamp(16px, 5vw, 26px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .dBtn.pressed { background: #2a2a2a; border-color: #666; color: #fff; }
  #dUp    { top: 0;     left: 33.3%; }
  #dDown  { bottom: 0;  left: 33.3%; }
  #dLeft  { top: 33.3%; left: 0;     }
  #dRight { top: 33.3%; right: 0;    }
  #fireBtn {
    width: clamp(80px, 22vw, 130px);
    height: clamp(80px, 22vw, 130px);
    border-radius: 50%;
    background: #1a0000;
    border: 2.5px solid #f00;
    color: #f44;
    font-family: monospace;
    font-size: clamp(11px, 3vw, 17px);
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #fireBtn.pressed { background: #300; border-color: #f44; color: #fff; }
</style>
</head>
<body>
<div id="ui"><span id="sc">SCORE: 0</span><span id="lv">LEVEL: 1</span><span id="lf">LIVES: ♥♥♥</span></div>
<canvas id="gameCanvas" tabindex="0"></canvas>
<div id="touchControls">
  <div id="dpad">
    <div class="dBtn" id="dUp">▲</div>
    <div class="dBtn" id="dDown">▼</div>
    <div class="dBtn" id="dLeft">◀</div>
    <div class="dBtn" id="dRight">▶</div>
  </div>
  <button id="fireBtn">ОГОНЬ</button>
</div>

<script>
const cv = document.getElementById('gameCanvas');
const cx = cv.getContext('2d');
const GW = 360, GH = 480;
let scale = 1;

function resize() {
  const ui = document.getElementById('ui');
  const tc = document.getElementById('touchControls');
  const uiH = ui.offsetHeight;
  const availW = window.innerWidth;
  const availH = window.innerHeight;
  const ctrlH = Math.max(140, Math.min(availH * 0.28, 200));
  const canvasAvailH = availH - uiH - ctrlH;
  scale = Math.min(availW / GW, canvasAvailH / GH);
  cv.width = GW; cv.height = GH;
  cv.style.width = (GW * scale) + 'px';
  cv.style.height = (GH * scale) + 'px';
  tc.style.height = ctrlH + 'px';
}
window.addEventListener('resize', resize);
setTimeout(resize, 50);

const W = GW, H = GH;
let state = 'menu', score = 0, lives = 3, level = 1, frame = 0;
let player, bullets, enemies, enemyBullets, stars, explosions, invincible = 0;
let boss = null, bossActive = false, bossDefeated = false;

let actx = null;
function getACtx() { if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }
function beep(freq,type,dur,vol,freqEnd) {
  try { const a=getACtx(),o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination); o.type=type||'square'; o.frequency.setValueAtTime(freq,a.currentTime); if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,a.currentTime+dur); g.gain.setValueAtTime(vol||0.15,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur); o.start(a.currentTime);o.stop(a.currentTime+dur); } catch(e){}
}
function sndShoot()    { beep(880,'square',0.07,0.12,220); }
function sndHit()      { beep(200,'sawtooth',0.1,0.18,80); }
function sndExplode()  { beep(120,'sawtooth',0.25,0.25,40); }
function sndPlayerHit(){ beep(150,'square',0.3,0.2,60); }
function sndLevelUp()  { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'square',0.12,0.15),i*80)); }
function sndBossAppear(){ [110,140,180,220,180,140].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.15,0.2),i*100)); }
function sndBossDie()  { [400,300,200,150,100,80].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.2,0.22),i*120)); }
function sndGameOver() { [440,330,220,110].forEach((f,i)=>setTimeout(()=>beep(f,'square',0.2,0.18),i*150)); }

const keys = {};
function setKey(code,val){keys[code]=val;}
window.addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='Space')e.preventDefault(); if(state==='menu'){initGame();state='playing';} if(state==='gameover'&&e.code==='Space'){initGame();state='playing';} });
window.addEventListener('keyup',e=>keys[e.code]=false);

function bindBtn(id,code) {
  const el=document.getElementById(id);
  const on=e=>{ e.preventDefault();setKey(code,true);el.classList.add('pressed'); if(state==='menu'){initGame();state='playing';} if(state==='gameover'&&code==='Space'){initGame();state='playing';} };
  const off=e=>{ e.preventDefault();setKey(code,false);el.classList.remove('pressed'); };
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off,{passive:false}); el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindBtn('dUp','ArrowUp'); bindBtn('dDown','ArrowDown'); bindBtn('dLeft','ArrowLeft'); bindBtn('dRight','ArrowRight'); bindBtn('fireBtn','Space');
cv.addEventListener('click',()=>{ if(state==='menu'){initGame();state='playing';} });

function initStars(){return Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5,sp:Math.random()*1.5+0.5}));}

function initGame() {
  player={x:170,y:400,w:20,h:22,cooldown:0};
  bullets=[];enemies=[];enemyBullets=[];explosions=[];
  stars=initStars(); score=0;lives=3;level=1;frame=0;invincible=0;
  boss=null;bossActive=false;bossDefeated=false;
  spawnWave();
}

function spawnWave() {
  if(level===5&&!bossDefeated){spawnBoss();return;}
  const rows=2+Math.min(level-1,3),cols=5+Math.min(level-1,3);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    enemies.push({x:30+c*((W-60)/cols),y:20+r*36,w:18,h:16,hp:1+(level>3?1:0),dx:(Math.random()<0.5?1:-1)*0.4,shootTimer:Math.random()*120+60});
  if(level>1) sndLevelUp();
}

function spawnBoss() { bossActive=true; boss={x:W/2-40,y:20,w:80,h:55,hp:40,maxHp:40,dx:1.2,shootTimer:40,phase:0,t:0}; sndBossAppear(); }

function drawPixelPlane(x,y,col) {
  cx.fillStyle=col; cx.fillRect(x+8,y,4,4);cx.fillRect(x+5,y+4,10,6);cx.fillRect(x+2,y+8,16,5);cx.fillRect(x,y+10,20,3);cx.fillRect(x+8,y+13,4,6);
  cx.fillStyle='#0ff';cx.fillRect(x+9,y+5,2,3);
}
function drawEnemyPlane(x,y,col) {
  cx.fillStyle=col; cx.fillRect(x+7,y+12,4,4);cx.fillRect(x+4,y+8,10,5);cx.fillRect(x+1,y+4,16,5);cx.fillRect(x,y+6,18,3);cx.fillRect(x+7,y,4,5);
  cx.fillStyle='#f00';cx.fillRect(x+8,y+9,2,3);
}
function drawBoss(b) {
  const fl=b.t%10<5; cx.fillStyle=fl?'#f84':'#c33';
  cx.fillRect(b.x+30,b.y,20,10);cx.fillRect(b.x+15,b.y+10,50,15);cx.fillRect(b.x,b.y+20,80,18);cx.fillRect(b.x+5,b.y+35,70,12);cx.fillRect(b.x+25,b.y+45,30,10);
  cx.fillStyle='#ff0';cx.fillRect(b.x+10,b.y+22,8,8);cx.fillRect(b.x+62,b.y+22,8,8);
  cx.fillStyle='#f00';cx.fillRect(b.x+34,b.y+24,12,6);
  cx.fillStyle='#300';cx.fillRect(b.x,b.y-10,80,6);
  cx.fillStyle='#f00';cx.fillRect(b.x,b.y-10,80*(b.hp/b.maxHp),6);
  cx.strokeStyle='#f84';cx.lineWidth=1;cx.strokeRect(b.x,b.y-10,80,6);
}
function drawExplosion(exp) {
  const p=1-exp.t/exp.max;
  ['#ff0','#f80','#f00','#fff'].forEach((col,i)=>{ const a=(i/4)*Math.PI*2+exp.t*0.1,r=exp.t*1.8; cx.fillStyle=col;cx.fillRect(exp.x+Math.cos(a)*r-2,exp.y+Math.sin(a)*r-2,4*p+1,4*p+1); });
}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function update() {
  frame++;
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  if(invincible>0) invincible--;
  const spd=2.8+level*0.15;
  if((keys['ArrowLeft']||keys['KeyA'])&&player.x>0) player.x-=spd;
  if((keys['ArrowRight']||keys['KeyD'])&&player.x<W-20) player.x+=spd;
  if((keys['ArrowUp']||keys['KeyW'])&&player.y>H*0.4) player.y-=spd;
  if((keys['ArrowDown']||keys['KeyS'])&&player.y<H-30) player.y+=spd;
  if(player.cooldown>0) player.cooldown--;
  if(keys['Space']&&player.cooldown===0){ bullets.push({x:player.x+8,y:player.y,w:4,h:8,dy:-9}); if(level>=3)bullets.push({x:player.x+16,y:player.y+4,w:3,h:7,dy:-9}); player.cooldown=12;sndShoot(); }
  bullets=bullets.filter(b=>{b.y+=b.dy;return b.y>-10;});
  if(bossActive&&boss){
    boss.t++;boss.x+=boss.dx*(1+boss.phase*0.3);
    if(boss.x<=0||boss.x>=W-80) boss.dx*=-1;
    if(boss.hp<boss.maxHp*0.5) boss.phase=1;
    boss.shootTimer--;
    if(boss.shootTimer<=0){ const sp=boss.phase===1?5:3; for(let i=0;i<sp;i++){ const ang=-Math.PI/2+(i-(sp-1)/2)*0.25; enemyBullets.push({x:boss.x+35,y:boss.y+55,w:4,h:4,dy:Math.cos(ang)*4,dx:Math.sin(ang)*4,round:true}); } boss.shootTimer=boss.phase===1?25:40; }
    for(let bi=bullets.length-1;bi>=0;bi--){ if(rect(bullets[bi],boss)){ boss.hp--;bullets.splice(bi,1);sndHit(); if(boss.hp<=0){ for(let i=0;i<8;i++)explosions.push({x:boss.x+Math.random()*80,y:boss.y+Math.random()*55,t:0,max:25}); sndBossDie();boss=null;bossActive=false;bossDefeated=true;score+=500;level++;setTimeout(()=>spawnWave(),1500); } break; } }
  }
  enemies.forEach(e=>{ e.x+=e.dx*(1+level*0.08);e.shootTimer--; if(e.shootTimer<=0){ enemyBullets.push({x:e.x+7,y:e.y+16,w:3,h:7,dy:3+level*0.3,dx:0}); e.shootTimer=Math.max(30,90-level*8)+Math.random()*40; } if(e.x<=0||e.x>=W-18){e.dx*=-1;e.y+=8;} });
  enemyBullets=enemyBullets.filter(b=>{b.y+=b.dy;if(b.dx)b.x+=b.dx;return b.y<H+10&&b.x>-10&&b.x<W+10;});
  for(let bi=bullets.length-1;bi>=0;bi--){ for(let ei=enemies.length-1;ei>=0;ei--){ if(rect(bullets[bi],enemies[ei])){ enemies[ei].hp--; if(enemies[ei].hp<=0){explosions.push({x:enemies[ei].x+9,y:enemies[ei].y+8,t:0,max:18});enemies.splice(ei,1);score+=10*level;sndExplode();}else sndHit(); bullets.splice(bi,1);break; } } }
  if(invincible===0){
    for(let bi=enemyBullets.length-1;bi>=0;bi--){ const bul=enemyBullets[bi],hb={x:player.x+3,y:player.y+3,w:14,h:16},br=bul.round?{x:bul.x-2,y:bul.y-2,w:8,h:8}:bul; if(rect(br,hb)){enemyBullets.splice(bi,1);lives--;invincible=90;explosions.push({x:player.x,y:player.y,t:0,max:30});sndPlayerHit();if(lives<=0){state='gameover';sndGameOver();}} }
    enemies.forEach(e=>{if(rect(e,{x:player.x+3,y:player.y+3,w:14,h:16})){lives--;invincible=90;sndPlayerHit();if(lives<=0){state='gameover';sndGameOver();}}});
  }
  explosions=explosions.filter(ex=>{ex.t++;return ex.t<ex.max;});
  if(enemies.length===0&&!bossActive&&level!==5){level++;spawnWave();}
}

function drawMenu() {
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle=s.sp>1.5?'#fff':s.sp>1?'#aaa':'#555';cx.fillRect(s.x,s.y,s.s,s.s);s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  drawPixelPlane(W/2-10,H/2-70,'#4df');
  cx.textAlign='center';
  cx.fillStyle='#ff0';cx.font='bold 26px monospace';cx.fillText('SKY FIGHTER',W/2,H/2-10);
  cx.fillStyle='#0f0';cx.font='13px monospace';cx.fillText('ATARI STYLE',W/2,H/2+12);
  cx.fillStyle='#777';cx.font='12px monospace';cx.fillText('ARROWS / WASD — движение',W/2,H/2+50);cx.fillText('ПРОБЕЛ — огонь',W/2,H/2+68);
  cx.fillStyle='#f84';cx.font='11px monospace';cx.fillText('★ БОСС НА УРОВНЕ 5 ★',W/2,H/2+90);
  if(Math.floor(frame/30)%2===0){cx.fillStyle='#ff0';cx.font='bold 13px monospace';cx.fillText('НАЖМИ ЛЮБУЮ КЛАВИШУ / КНОПКУ',W/2,H/2+115);}
  frame++;
}

function draw() {
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle=s.sp>1.5?'#fff':s.sp>1?'#aaa':'#555';cx.fillRect(s.x,s.y,s.s,s.s);});
  if(state==='playing'||state==='gameover'){
    if(invincible===0||frame%4<2) drawPixelPlane(player.x,player.y,'#4df');
    bullets.forEach(b=>{cx.fillStyle='#ff0';cx.fillRect(b.x,b.y,b.w,b.h);});
    const ecols=['#f44','#f84','#fa4'];
    enemies.forEach(e=>drawEnemyPlane(e.x,e.y,ecols[Math.floor(e.y/36)%3]));
    if(bossActive&&boss) drawBoss(boss);
    enemyBullets.forEach(b=>{ cx.fillStyle='#f0f'; if(b.round){cx.beginPath();cx.arc(b.x,b.y,4,0,Math.PI*2);cx.fill();}else cx.fillRect(b.x,b.y,b.w,b.h); });
    explosions.forEach(drawExplosion);
    if(bossActive&&boss&&frame%60<30){cx.fillStyle='#f84';cx.font='bold 13px monospace';cx.textAlign='center';cx.fillText('★ BOSS ★',W/2,H-8);}
  }
  if(state==='gameover'){
    cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);cx.textAlign='center';
    cx.fillStyle='#f00';cx.font='bold 28px monospace';cx.fillText('GAME OVER',W/2,H/2-20);
    cx.fillStyle='#ff0';cx.font='16px monospace';cx.fillText('SCORE: '+score,W/2,H/2+10);
    if(Math.floor(frame/30)%2===0){cx.fillStyle='#aaa';cx.font='13px monospace';cx.fillText('ПРОБЕЛ / ОГОНЬ — снова',W/2,H/2+40);}
  }
  document.getElementById('sc').textContent='SCORE: '+score;
  document.getElementById('lv').textContent='LEVEL: '+level;
  document.getElementById('lf').textContent='LIVES: '+'♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
}

function loop() {
  if(state==='menu') drawMenu(); else{if(state==='playing')update();draw();}
  requestAnimationFrame(loop);
}
stars=initStars(); resize(); loop();
</script>
</body>
</html>
