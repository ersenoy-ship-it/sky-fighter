<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; touch-action: none; user-select: none; }
  #ui { font-family: monospace; color: #fff; text-align: center; padding: 6px 0 2px; background: #000; width: 360px; }
  #ui span { margin: 0 12px; font-size: 13px; letter-spacing: 1px; }
  #gameCanvas { display: block; background: #000; image-rendering: pixelated; touch-action: none; }
  #touchControls { width: 360px; height: 110px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  #dpad { position: relative; width: 110px; height: 110px; }
  .dBtn { position: absolute; width: 36px; height: 36px; background: #111; border: 1.5px solid #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 16px; cursor: pointer; }
  .dBtn:active, .dBtn.pressed { background: #2a2a2a; border-color: #555; color: #fff; }
  #dUp    { top: 0;    left: 37px; }
  #dDown  { bottom: 0; left: 37px; }
  #dLeft  { top: 37px; left: 0; }
  #dRight { top: 37px; right: 0; }
  #fireBtn { width: 72px; height: 72px; border-radius: 50%; background: #1a0000; border: 2px solid #f00; color: #f44; font-family: monospace; font-size: 12px; font-weight: bold; letter-spacing: 1px; cursor: pointer; }
  #fireBtn:active, #fireBtn.pressed { background: #300; border-color: #f44; color: #fff; }
</style>

<div id="ui"><span id="sc">SCORE: 0</span><span id="lv">LEVEL: 1</span><span id="lf">LIVES: ♥♥♥</span></div>
<canvas id="gameCanvas" width="360" height="480" tabindex="0"></canvas>
<div id="touchControls">
  <div id="dpad">
    <div class="dBtn" id="dUp">▲</div>
    <div class="dBtn" id="dDown">▼</div>
    <div class="dBtn" id="dLeft">◀</div>
    <div class="dBtn" id="dRight">▶</div>
  </div>
  <button id="fireBtn">ОГОНЬ</button>
</div>

<script>
const cv = document.getElementById('gameCanvas');
const cx = cv.getContext('2d');
const W = 360, H = 480;
let state = 'menu', score = 0, lives = 3, level = 1, frame = 0;
let player, bullets, enemies, enemyBullets, stars, explosions, invincible = 0;

const keys = {};

function setKey(code, val) { keys[code] = val; }

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code==='Space') e.preventDefault();
  if(state==='menu') { initGame(); state='playing'; }
  if(state==='gameover' && e.code==='Space') { initGame(); state='playing'; }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function bindBtn(id, code) {
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); setKey(code, true); el.classList.add('pressed'); if(state==='menu'){initGame();state='playing';} if(state==='gameover'&&code==='Space'){initGame();state='playing';} };
  const off = e => { e.preventDefault(); setKey(code, false); el.classList.remove('pressed'); };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}

bindBtn('dUp',    'ArrowUp');
bindBtn('dDown',  'ArrowDown');
bindBtn('dLeft',  'ArrowLeft');
bindBtn('dRight', 'ArrowRight');
bindBtn('fireBtn','Space');

cv.addEventListener('click', () => { if(state==='menu'){initGame();state='playing';} });

function initStars() {
  return Array.from({length:60}, () => ({x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.5+0.5, sp:Math.random()*1.5+0.5}));
}

function initGame() {
  player={x:170,y:400,w:20,h:22,cooldown:0};
  bullets=[]; enemies=[]; enemyBullets=[]; explosions=[];
  stars=initStars();
  score=0; lives=3; level=1; frame=0; invincible=0;
  spawnWave();
}

function spawnWave() {
  const rows=2+Math.min(level-1,3), cols=5+Math.min(level-1,3);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    enemies.push({x:30+c*((W-60)/cols), y:20+r*36, w:18, h:16, hp:1+(level>3?1:0), dx:(Math.random()<0.5?1:-1)*0.4, shootTimer:Math.random()*120+60});
}

function drawPixelPlane(x,y,col) {
  cx.fillStyle=col;
  cx.fillRect(x+8,y,4,4); cx.fillRect(x+5,y+4,10,6);
  cx.fillRect(x+2,y+8,16,5); cx.fillRect(x,y+10,20,3);
  cx.fillRect(x+8,y+13,4,6);
  cx.fillStyle='#0ff'; cx.fillRect(x+9,y+5,2,3);
}

function drawEnemyPlane(x,y,col) {
  cx.fillStyle=col;
  cx.fillRect(x+7,y+12,4,4); cx.fillRect(x+4,y+8,10,5);
  cx.fillRect(x+1,y+4,16,5); cx.fillRect(x,y+6,18,3);
  cx.fillRect(x+7,y,4,5);
  cx.fillStyle='#f00'; cx.fillRect(x+8,y+9,2,3);
}

function drawExplosion(exp) {
  const p=1-exp.t/exp.max;
  ['#ff0','#f80','#f00','#fff'].forEach((col,i)=>{
    const a=(i/4)*Math.PI*2+exp.t*0.1, r=exp.t*1.8;
    cx.fillStyle=col;
    cx.fillRect(exp.x+Math.cos(a)*r-2, exp.y+Math.sin(a)*r-2, 4*p+1, 4*p+1);
  });
}

function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function update() {
  frame++;
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  if(invincible>0) invincible--;

  const spd=2.8+level*0.15;
  if((keys['ArrowLeft']||keys['KeyA'])&&player.x>0) player.x-=spd;
  if((keys['ArrowRight']||keys['KeyD'])&&player.x<W-20) player.x+=spd;
  if((keys['ArrowUp']||keys['KeyW'])&&player.y>H*0.4) player.y-=spd;
  if((keys['ArrowDown']||keys['KeyS'])&&player.y<H-30) player.y+=spd;

  if(player.cooldown>0) player.cooldown--;
  if(keys['Space']&&player.cooldown===0){
    bullets.push({x:player.x+8,y:player.y,w:4,h:8,dy:-9});
    if(level>=3) bullets.push({x:player.x+16,y:player.y+4,w:3,h:7,dy:-9});
    player.cooldown=12;
  }

  bullets=bullets.filter(b=>{b.y+=b.dy;return b.y>-10;});

  enemies.forEach(e=>{
    e.x+=e.dx*(1+level*0.08);
    e.shootTimer--;
    if(e.shootTimer<=0){
      enemyBullets.push({x:e.x+7,y:e.y+16,w:3,h:7,dy:3+level*0.3});
      e.shootTimer=Math.max(30,90-level*8)+Math.random()*40;
    }
    if(e.x<=0||e.x>=W-18){e.dx*=-1;e.y+=8;}
  });

  enemyBullets=enemyBullets.filter(b=>{b.y+=b.dy;return b.y<H+10;});

  for(let bi=bullets.length-1;bi>=0;bi--){
    for(let ei=enemies.length-1;ei>=0;ei--){
      if(rect(bullets[bi],enemies[ei])){
        enemies[ei].hp--;
        if(enemies[ei].hp<=0){
          explosions.push({x:enemies[ei].x+9,y:enemies[ei].y+8,t:0,max:18});
          enemies.splice(ei,1);
          score+=10*level;
        }
        bullets.splice(bi,1); break;
      }
    }
  }

  if(invincible===0){
    for(let bi=enemyBullets.length-1;bi>=0;bi--){
      if(rect(enemyBullets[bi],{x:player.x+3,y:player.y+3,w:14,h:16})){
        enemyBullets.splice(bi,1);
        lives--; invincible=90;
        explosions.push({x:player.x,y:player.y,t:0,max:30});
        if(lives<=0) state='gameover';
      }
    }
  }

  explosions=explosions.filter(ex=>{ex.t++;return ex.t<ex.max;});
  if(enemies.length===0){level++;spawnWave();}
}

function drawMenu() {
  cx.fillStyle='#000'; cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle=s.sp>1.5?'#fff':s.sp>1?'#aaa':'#555';cx.fillRect(s.x,s.y,s.s,s.s);s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  drawPixelPlane(W/2-10,H/2-70,'#4df');
  cx.textAlign='center';
  cx.fillStyle='#ff0'; cx.font='bold 26px monospace'; cx.fillText('SKY FIGHTER',W/2,H/2-10);
  cx.fillStyle='#0f0'; cx.font='13px monospace'; cx.fillText('ATARI STYLE',W/2,H/2+12);
  cx.fillStyle='#777'; cx.font='12px monospace';
  cx.fillText('ARROWS / WASD — движение',W/2,H/2+50);
  cx.fillText('ПРОБЕЛ — огонь',W/2,H/2+68);
  if(Math.floor(frame/30)%2===0){
    cx.fillStyle='#ff0'; cx.font='bold 13px monospace';
    cx.fillText('НАЖМИ ЛЮБУЮ КЛАВИШУ / КНОПКУ',W/2,H/2+105);
  }
  frame++;
}

function draw() {
  cx.fillStyle='#000'; cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle=s.sp>1.5?'#fff':s.sp>1?'#aaa':'#555';cx.fillRect(s.x,s.y,s.s,s.s);});
  if(state==='playing'||state==='gameover'){
    if(invincible===0||frame%4<2) drawPixelPlane(player.x,player.y,'#4df');
    bullets.forEach(b=>{cx.fillStyle='#ff0';cx.fillRect(b.x,b.y,b.w,b.h);});
    const ecols=['#f44','#f84','#fa4'];
    enemies.forEach(e=>drawEnemyPlane(e.x,e.y,ecols[Math.floor(e.y/36)%3]));
    enemyBullets.forEach(b=>{cx.fillStyle='#f0f';cx.fillRect(b.x,b.y,b.w,b.h);});
    explosions.forEach(drawExplosion);
  }
  if(state==='gameover'){
    cx.fillStyle='rgba(0,0,0,0.55)'; cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    cx.fillStyle='#f00'; cx.font='bold 28px monospace'; cx.fillText('GAME OVER',W/2,H/2-20);
    cx.fillStyle='#ff0'; cx.font='16px monospace'; cx.fillText('SCORE: '+score,W/2,H/2+10);
    if(Math.floor(frame/30)%2===0){cx.fillStyle='#aaa';cx.font='13px monospace';cx.fillText('ПРОБЕЛ / ОГОНЬ — снова',W/2,H/2+40);}
  }
  document.getElementById('sc').textContent='SCORE: '+score;
  document.getElementById('lv').textContent='LEVEL: '+level;
  document.getElementById('lf').textContent='LIVES: '+'♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
}

function loop() {
  if(state==='menu') drawMenu();
  else { if(state==='playing') update(); draw(); }
  requestAnimationFrame(loop);
}

stars=initStars();
loop();
</script>
